<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Choice Admin | Login</title>
    <link rel="stylesheet" href="/static/admin.css">
    <script src="/static/admin.js" defer></script>
</head>
<body class="admin-login-body">

    <main class="login-container" aria-labelledby="adminLoginTitle">
        <section class="login-box" role="form">
            <header class="login-header">
                <div class="login-brand">
                    <div class="login-brand-icon" aria-hidden="true">🍃</div>
                    <div class="login-brand-text">
                        <h1 class="login-brand-name">Healthy Choice</h1>
                        <p class="login-brand-subtitle">Admin Portal</p>
                    </div>
                </div>
                <h2 id="adminLoginTitle" class="login-title">Admin Sign In</h2>
                <p class="login-subtitle">Access your cafe management dashboard</p>
            </header>

            <div id="adminLoginError" class="error-message" role="alert" aria-live="polite" hidden></div>

            <form id="adminLoginForm" novalidate>
                <div class="form-group">
                    <label for="adminEmail">Email address</label>
                    <input
                        type="email"
                        id="adminEmail"
                        name="email"
                        autocomplete="username"
                        placeholder="Enter admin email"
                        required>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input
                        type="password"
                        id="adminPassword"
                        name="password"
                        autocomplete="current-password"
                        placeholder="Enter password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary login-btn" id="adminLoginButton">
                    Sign in
                </button>
            </form>

            <footer class="login-footer">
                <p>&copy; {{ current_year or 2024 }} Healthy Choice. Admin Panel</p>
            </footer>
        </section>
    </main>

</body>
</html>
